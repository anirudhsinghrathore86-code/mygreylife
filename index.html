<div class="flex flex-col items-center mb-8">
  <img id="user-pfp" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-full border border-border mb-4 object-cover">
  <input type="text" id="pfp-input" placeholder="Paste Image URL" class="input-field hidden w-64 text-center">
</div>

<div id="social-list" class="social-list">
  </div>

<div id="god-controls" class="hidden mt-6 flex gap-4">
    <button onclick="addSocialHandle()" class="btn-ghost border-white text-white">Add Social Link +</button>
</div>

<script>
  // UPDATED STATE
  let state = JSON.parse(localStorage.getItem('anrdh86_state')) || {
    name: "anrdh86",
    bio: "Builder of quiet things.",
    pfp: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=200",
    socials: [
        { platform: "Instagram", handle: "@anrdh86", url: "https://instagram.com/anrdh86" },
        { platform: "GitHub", handle: "github.com/anrdh86", url: "https://github.com/anrdh86" }
    ],
    blogs: [],
    projects: []
  };

  function triggerAuth() {
    const code = prompt("Enter Access Code:");
    if (code === "7425020630") {
        document.querySelectorAll('.admin-panel').forEach(p => p.style.display = 'block');
    } else if (code === "anirudhisstraight") {
        enableGodMode();
    }
  }

  function enableGodMode() {
    godMode = true;
    document.getElementById('body-main').classList.add('god-mode-active');
    document.getElementById('god-save-btn').style.display = 'block';
    document.getElementById('god-controls').classList.remove('hidden');
    document.getElementById('pfp-input').classList.remove('hidden');
    
    // Make texts editable
    document.querySelectorAll('.editable').forEach(el => el.contentEditable = true);
    render(); // Re-render to show delete buttons
  }

  function addSocialHandle() {
    const platform = prompt("Platform Name (e.g. Twitter):");
    const handle = prompt("Handle (e.g. @anirudh):");
    const url = prompt("Full URL:");
    if(platform && handle && url) {
        state.socials.push({ platform, handle, url });
        render();
    }
  }

  function deleteSocial(index) {
    state.socials.splice(index, 1);
    render();
  }

  function saveGodModeChanges() {
    // Capture standard text
    state.name = document.getElementById('user-name').innerText;
    state.bio = document.getElementById('user-bio').innerText;
    
    // Capture PFP if changed
    const newPfp = document.getElementById('pfp-input').value;
    if(newPfp) state.pfp = newPfp;

    localStorage.setItem('anrdh86_state', JSON.stringify(state));
    alert("Identity Updated.");
    location.reload();
  }

  function render() {
    localStorage.setItem('anrdh86_state', JSON.stringify(state));
    
    // Update Home Basic Info
    document.getElementById('user-name').innerText = state.name;
    document.getElementById('user-bio').innerText = state.bio;
    document.getElementById('user-pfp').src = state.pfp;

    // Render Socials
    const sList = document.getElementById('social-list');
    sList.innerHTML = state.socials.map((s, index) => `
      <div class="social-item flex justify-between items-center">
        <a href="${s.url}" target="_blank" class="flex-1 flex items-center gap-8 no-underline">
            <span class="social-platform">${s.platform}</span>
            <span class="social-handle">${s.handle}</span>
        </a>
        ${godMode ? `<button onclick="deleteSocial(${index})" class="text-red-500 text-[9px] border border-red-500 px-2">DEL</button>` : ''}
      </div>
    `).join('');

    // ... Keep your Blog and Project render logic from previous version ...
  }

  render();
      </script>
