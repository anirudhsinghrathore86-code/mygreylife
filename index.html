<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>anrdh86 — portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  background:#000;
  color:#fff;
  font-family:'JetBrains Mono', monospace;
  margin:0;
}

/* NAV */
nav {
  display:flex;
  gap:20px;
  padding:15px;
  border-bottom:1px solid #222;
}
nav button {
  background:none;
  border:none;
  color:#888;
  cursor:pointer;
}
nav button.active { color:#fff; }

/* PAGES */
.page { display:none; padding:20px; }
.page.active { display:block; }

/* BLOG */
.blog-post {
  border-bottom:1px solid #222;
  padding:15px 0;
}
button { cursor:pointer; }

/* GOD MODE */
body.god-mode [data-editable] {
  outline:1px dashed #555;
}
.delete-btn {
  margin-left:10px;
  color:red;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <button onclick="showPage('home')" class="active">Home</button>
  <button onclick="showPage('blog')">Blog</button>
  <button onclick="showPage('projects')">Projects</button>
  <button onclick="logout()">Logout</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1 data-editable>Anirudh</h1>
  <p data-editable>builder of things.</p>
</div>

<!-- BLOG -->
<div id="blog" class="page">

  <!-- Unlock -->
  <input id="pass" placeholder="enter passcode">
  <button onclick="unlock()">Unlock</button>

  <!-- Create -->
  <div id="createBox" style="display:none;">
    <input id="title" placeholder="title"><br><br>
    <textarea id="body" placeholder="write..."></textarea><br>
    <label><input type="checkbox" id="private"> Private</label><br>
    <button onclick="addPost()">Post</button>
  </div>

  <!-- Toggle -->
  <button onclick="togglePrivate()">Toggle Private</button>

  <div id="posts"></div>

</div>

<!-- PROJECTS -->
<div id="projects" class="page">
  <h2 data-editable>My Projects</h2>
  <p data-editable>coming soon...</p>
</div>

<script>

/* PASSCODES */
const BLOGGER = "7425020630";
const GOD = "anirudhisstraight";

/* STATE */
let access = localStorage.getItem("access") || "guest";
let posts = JSON.parse(localStorage.getItem("posts") || "[]");
let showPrivate = true;

/* NAV */
function showPage(id) {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* UNLOCK */
function unlock() {
  const val = document.getElementById("pass").value;

  if(val === BLOGGER){
    access = "blogger";
  } else if(val === GOD){
    access = "god";
  } else {
    alert("wrong passcode");
    return;
  }

  localStorage.setItem("access", access);
  applyAccess();
}

/* APPLY ACCESS */
function applyAccess(){

  // create box
  document.getElementById("createBox").style.display =
    (access !== "guest") ? "block" : "none";

  // god mode
  if(access === "god"){
    document.body.classList.add("god-mode");
    document.querySelectorAll("[data-editable]").forEach(el=>{
      el.contentEditable = true;
    });
  } else {
    document.body.classList.remove("god-mode");
    document.querySelectorAll("[data-editable]").forEach(el=>{
      el.contentEditable = false;
    });
  }

  render();
}

/* POSTS */
function addPost(){
  const t = document.getElementById("title").value;
  const b = document.getElementById("body").value;
  const p = document.getElementById("private").checked;

  if(!t || !b) return alert("fill fields");

  posts.unshift({
    id: Date.now(),
    title:t,
    body:b,
    private:p,
    date:new Date().toLocaleDateString()
  });

  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

/* RENDER */
function render(){
  const el = document.getElementById("posts");
  el.innerHTML = "";

  posts.forEach(post=>{
    if(post.private && access==="guest") return;
    if(post.private && !showPrivate && access!=="guest") return;

    const div = document.createElement("div");
    div.className="blog-post";

    div.innerHTML = `
      <b>${post.title}</b> (${post.date})
      <p>${post.body}</p>
      ${access!=="guest" ? `<span class="delete-btn" onclick="del(${post.id})">delete</span>`:""}
    `;

    el.appendChild(div);
  });
}

/* DELETE */
function del(id){
  posts = posts.filter(p=>p.id!==id);
  localStorage.setItem("posts", JSON.stringify(posts));
  render();
}

/* TOGGLE PRIVATE */
function togglePrivate(){
  showPrivate = !showPrivate;
  render();
}

/* LOGOUT */
function logout(){
  access="guest";
  localStorage.setItem("access","guest");
  applyAccess();
}

/* INIT */
applyAccess();

</script>

</body>
</html>
